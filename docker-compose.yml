version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: eventpulse_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: EventPulseDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:alpine
    container_name: eventpulse_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventpulse_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=EventPulseDb;Username=admin;Password=password123
      - Redis__Configuration=cache:6379
    ports:
      - "5000:8080"
    depends_on:
      - db
      - cache
    restart: on-failure

volumes:
  postgres_data:
